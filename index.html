<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LangSift Direct v5.1</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --card-bg: #ffffff;
            --text-color: #2c2520;
            --text-muted: #6e655f;
            --accent-color: #8c7853;
            --accent-light: #eaddca;
            --success-color: #2e7d32;
            --nav-bg: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 500px; width: 100%; min-height: 100vh; box-sizing: border-box; padding: 20px 20px 110px 20px; }
        .menu-view { display: none; }
        .menu-view.active { display: block; }
        .app-header { margin-top: 10px; margin-bottom: 20px; text-align: center; }
        .app-header h1 { font-size: 26px; margin: 0; font-family: Georgia, serif; }
        .app-header p { color: var(--text-muted); margin: 4px 0 0 0; font-size: 13px; }
        .feed-section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); margin: 25px 0 12px 0; font-weight: bold; border-bottom: 1px solid var(--accent-light); padding-bottom: 4px; }
        .action-bar { display: flex; justify-content: center; margin-bottom: 15px; gap: 10px; }
        .refresh-btn { background-color: var(--card-bg); border: 1px solid var(--accent-light); color: var(--accent-color); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .item-list { display: flex; flex-direction: column; gap: 12px; }
        .content-card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); cursor: pointer; }
        .content-card h3 { margin: 0 0 6px 0; font-size: 15px; line-height: 1.35; }
        .content-card p { margin: 0; font-size: 12px; color: var(--text-muted); line-height: 1.4; }
        .reader-header { position: fixed; top: 0; left: 0; right: 0; background-color: var(--bg-color); padding: 14px 20px; box-shadow: 0 3px 15px rgba(0,0,0,0.07); display: flex; flex-direction: column; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-row { display: flex; width: 100%; max-width: 500px; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .back-btn { background: none; border: none; font-size: 15px; color: var(--accent-color); font-weight: bold; cursor: pointer; }
        .slider-label { font-size: 12px; font-weight: bold; }
        .slider-container { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; }
        input[type="range"] { width: 100%; accent-color: var(--accent-color); margin: 4px 0; }
        .ticks { display: flex; justify-content: space-between; width: 100%; font-size: 10px; font-weight: bold; color: #888; }
        .reader-content { margin-top: 130px; width: 100%; }
        .story-title { font-family: Georgia, serif; font-size: 24px; margin-bottom: 18px; line-height: 1.3; font-weight: bold; }
        .text-block p { font-size: 16.5px; line-height: 1.8; margin-bottom: 20px; text-align: justify; }
        span.w { border-bottom: 1px dashed var(--accent-color); cursor: pointer; padding: 0 1px; }
        span.w:active { background-color: var(--accent-light); }
        .eng-toggle-btn { display: block; margin: 25px auto; background: none; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .english-translation-panel { background-color: #f3f0ea; border-left: 4px solid var(--accent-color); padding: 16px; font-size: 14.5px; color: #444; line-height: 1.6; white-space: pre-line; display: none; margin-bottom: 35px; border-radius: 0 8px 8px 0; }
        
        /* PREMIUM VISUAL MARKETING ADVERT DESIGN */
        .brand-ad-card { 
            position: relative; 
            min-height: 200px; 
            border-radius: 16px; 
            overflow: hidden; 
            margin: 35px 0; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            background-color: #000;
        }
        .brand-ad-bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&q=80&w=600');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .brand-ad-gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
        }
        .brand-ad-content {
            position: relative;
            z-index: 3;
            padding: 24px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
            box-sizing: border-box;
        }
        .brand-ad-label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; text-align: center; }
        .ad-badge { align-self: flex-start; background: #e60000; color: white; font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 20px; transform: rotate(-2deg); text-transform: uppercase; letter-spacing: 0.5px; }
        .ad-header { font-family: Georgia, serif; font-size: 19px; line-height: 1.4; margin: 20px 0 15px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.6); font-weight: bold; }
        .ad-footer-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; }
        .ad-cta { font-size: 13px; font-style: italic; color: #ddd; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .ad-tag-btn { background: #e60000; color: white; padding: 6px 14px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 2px 6px rgba(230,0,0,0.4); }
        
        .loading-screen { display: none; text-align: center; padding: 50px 20px; font-style: italic; color: var(--text-muted); }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--accent-color); animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flashcard-container { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
        .card-counter { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
        .flashcard { width: 100%; max-width: 340px; height: 180px; background-color: var(--card-bg); border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; position: relative; cursor: pointer; }
        .flashcard .word-surface { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .flashcard .word-translation { font-size: 17px; color: var(--accent-color); font-style: italic; display: none; }
        .card-hint { position: absolute; bottom: 12px; font-size: 10px; color: #aaa; text-transform: uppercase; }
        .card-controls { display: flex; gap: 15px; margin-top: 20px; width: 100%; max-width: 340px; }
        .card-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .btn-know { background-color: var(--success-color); }
        .btn-unknown { background-color: var(--accent-color); }
        .empty-deck { text-align: center; color: var(--text-muted); padding: 40px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background-color: var(--nav-bg); border-top: 1px solid rgba(0,0,0,0.06); display: flex; justify-content: space-around; align-items: center; z-index: 900; }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #aaa; font-size: 11px; font-weight: bold; width: 50%; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item-icon { font-size: 18px; margin-bottom: 2px; }
        .toast { position: fixed; bottom: 80px; background: #2c2520; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="view-news" class="menu-view active">
            <div class="app-header">
                <h1>LangSift Direct</h1>
                <p>Niveaux CEFR en direct et intégration publicitaire</p>
            </div>
            <div class="action-bar">
                <button class="refresh-btn" onclick="generateMultiFeedMatrix()">🔄 Actualiser</button>
                <button class="refresh-btn" style="color:#c62828;" onclick="clearApiKey()">🔑 Reset Key</button>
            </div>
            
            <div id="loading-spinner-block" class="loading-screen">
                <div class="spinner"></div>
                <div id="spinner-text-msg">Analyse linguistique et génération des niveaux...</div>
            </div>

            <div id="news-feeds-canvas">
                <div class="feed-section-title">📍 Actu Paris</div>
                <div id="news-paris-container" class="item-list"></div>
                
                <div class="feed-section-title">🇪🇺 Actu Europe</div>
                <div id="news-europe-container" class="item-list"></div>

                <div class="feed-section-title">🌍 Actu Monde</div>
                <div id="news-world-container" class="item-list"></div>
            </div>
        </div>

        <div id="view-flashcards" class="menu-view">
            <div class="app-header">
                <h1>Mon Vocabulaire</h1>
                <p>Mots enregistrés depuis vos lectures</p>
            </div>
            <div id="deck-wrapper"></div>
        </div>

        <div id="view-reader" class="menu-view">
            <div class="reader-header">
                <div class="nav-row">
                    <button class="back-btn" onclick="exitReaderView()">✕ Retour</button>
                    <div class="slider-label">NIVEAU CEFR: <span id="level-tag">A1</span></div>
                </div>
                <div class="slider-container">
                    <input type="range" id="level-slider" min="1" max="5" value="1" step="1">
                    <div class="ticks">
                        <span>A1</span><span>A2</span><span>B1</span><span>C1</span><span>Fluide</span>
                    </div>
                </div>
            </div>

            <div class="reader-content">
                <div id="reader-title-display" class="story-title"></div>
                <div id="reader-body-display" class="text-block"></div>
                
                <div class="brand-ad-label">Sponsorisé — Coca-Cola Zéro</div>
                <div id="brand-ad-placement" class="brand-ad-card">
                    <div class="brand-ad-bg-image"></div>
                    <div class="brand-ad-gradient-overlay"></div>
                    <div class="brand-ad-content">
                        <div id="ad-badge-display" class="ad-badge"></div>
                        <div id="ad-header-display" class="ad-header"></div>
                        <div class="ad-footer-row">
                            <div id="ad-cta-display" class="ad-cta"></div>
                            <div class="ad-tag-btn">Coca-Cola Zéro</div>
                        </div>
                    </div>
                </div>

                <button class="eng-toggle-btn" onclick="toggleTranslationBox()">Afficher la traduction / Show English</button>
                <div id="reader-translation-panel" class="english-translation-panel"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchActiveTab('view-news', this)">
            <div class="nav-item-icon">📰</div><div>Actualités</div>
        </button>
        <button class="nav-item" onclick="switchActiveTab('view-flashcards', this)">
            <div class="nav-item-icon">🎴</div><div>Flashcards (<span id="global-card-count">0</span>)</div>
        </button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let vocabularyList = [];
        let newsArticlesCache = [];
        let selectedLevelIndex = 1;
        let selectedArticle = null;
        let activeCardIndex = 0;
        const levels = { 1: "A1", 2: "A2", 3: "B1", 4: "C1", 5: "Fluide" };

        const adMatrix = {
            1: { header: "Partagez le <b>goût</b> de Coca-Cola. Sans <b>sucre</b> !", badge: "Nouveau goût !", cta: "Déjà goûté ?", eng: "[A1 Ad] Share the taste of Coca-Cola. Without sugar! / New taste! / Tried it?" },
            2: { header: "Partagez le bon <b>goût</b> de Coca-Cola. Zéro <b>sucre</b> !", badge: "Nouvelle recette !", cta: "L'avez-vous essayé ?", eng: "[A2 Ad] Share the good taste... / New recipe! / Have you tried it?" },
            3: { header: "Partagez le vrai <b>goût</b> de Coca-Cola, le <b>sucre</b> en moins.", badge: "Nouvelle Formule !", cta: "Qu'attendez-vous pour y goûter ?", eng: "[B1 Ad] Share the true taste... / New Formula! / What are you waiting for?" },
            4: { header: "Partagez toute l'<b>intensité</b> de Coca-Cola, la culpabilité en moins.", badge: "Saveur réinventée !", cta: "Prêt à tenter l'<b>expérience</b> ?", eng: "[C1 Ad] Share all the intensity... / Re-invented flavor! / Ready for the experience?" },
            5: { header: "Partagez le <b>goût</b> unique de Coca-Cola. Tout le <b>plaisir</b>, zéro <b>sucre</b>.", badge: "Pure intensité !", cta: "L'avez-vous testé ?", eng: "[Fluide Ad] Share the unique taste... / All the pleasure, zero sugar. / Tested it?" }
        };

        function getApiKey() {
            let key = localStorage.getItem('GEMINI_KEY');
            if (!key) {
                key = prompt("🔒 Clé API Google AI Studio requise pour l'analyse en direct :");
                if (key) localStorage.setItem('GEMINI_KEY', key);
            }
            return key;
        }

        function clearApiKey() {
            localStorage.removeItem('GEMINI_KEY');
            alert("Clé supprimée.");
            location.reload();
        }

        function switchActiveTab(tabId, element) {
            document.querySelectorAll('.menu-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            if (tabId === 'view-flashcards') renderFlashcards();
        }

        function generateMultiFeedMatrix() {
            showToast("📰 Chargement des 30 flux...");
            document.getElementById('news-paris-container').innerHTML = '';
            document.getElementById('news-europe-container').innerHTML = '';
            document.getElementById('news-world-container').innerHTML = '';
            newsArticlesCache = [];

            const database = {
                paris: [
                    { t: "Paris 2026: Modernisation verte majeure des places historiques", d: "La Mairie de Paris lance un plan de végétalisation massive pour transformer les grands axes routiers urbains en promenades ombragées." },
                    { t: "Rénovation et extension des pistes cyclables intra-muros", d: "De nouveaux aménagements protégés vont voir le jour pour fluidifier les déplacements écologiques dans le centre de la capitale." },
                    { t: "Nouveau festival culturel prévu le long de la Seine cet été", d: "Une alliance d'artistes locaux propose un parcours d'expositions gratuites en plein air pour dynamiser les quais parisiens." },
                    { t: "Inauguration d'un incubateur de start-ups écologiques à Bastille", d: "Ce nouvel espace va accueillir cinquante jeunes entreprises dédiées aux innovations technologiques environnementales." },
                    { t: "Plan de restauration pour les fontaines historiques de la ville", d: "Les monuments hydrauliques les plus célèbres vont bénéficier d'une modernisation de leurs circuits d'eau fermés." },
                    { t: "Ouverture prochaine d'un grand pôle de running au Bois de Boulogne", d: "Un centre d'accueil moderne va proposer des vestiaires, des parcours connectés et des conseils aux athlètes amateurs." },
                    { t: "Modernisation de l'éclairage public dans le Marais", d: "La ville déploie des systèmes LED intelligents pour préserver le patrimoine nocturne tout en réduisant la consommation." },
                    { t: "Exposition majeure dédiée au design urbain au Pavillon de l'Arsenal", d: "L'événement retrace un siècle d'innovations architecturales et présente les maquettes du Paris de demain." },
                    { t: "Création de potagers participatifs sur les toits des écoles", d: "Une initiative verte pour sensibiliser la jeune génération à l'agriculture urbaine et à la biodiversité." },
                    { t: "Nouveau plan de piétonnisation autour des grands monuments", d: "La circulation automobile sera restreinte le week-end aux abords directs des édifices les plus visités de la capitale." }
                ],
                europe: [
                    { t: "Bruxelles harmonise les normes énergétiques pour le logement", d: "L'Union Européenne adopte un texte majeur pour accélérer l'isolation thermique des bâtiments résidentiels publics." },
                    { t: "Coopération renforcée pour les trains à grande vitesse européens", d: "Les opérateurs ferroviaires annoncent de nouvelles lignes directes pour relier les grandes capitales sans escale." },
                    { t: "Sommet pour la protection de la biodiversité marine en Méditerranée", d: "Plusieurs pays côtiers s'engagent à élargir de manière stricte les zones maritimes totalement protégées." },
                    { t: "Nouveau programme de bourses pour la recherche spatiale", d: "L'Agence Spatiale Européenne va financer de nouveaux laboratoires universitaires dédiés à l'exploration robotique." },
                    { t: "Accord douanier simplifié pour les produits artisanaux régionaux", d: "Les parlements valident une directive facilitant l'exportation des savoir-faire traditionnels sur le continent." },
                    { t: "Plan européen pour la sauvegarde des forêts anciennes", d: "Une enveloppe financière dédiée va permettre de reboiser et de surveiller les parcs naturels sensibles." },
                    { t: "Mise en place d'un réseau unique de recharge électrique rapide", d: "Les grands axes routiers transfrontaliers seront équipés de bornes haute puissance tous les cinquante kilomètres." },
                    { t: "Protection renforcée pour les indications géographiques protégées", d: "L'Europe durcit les contrôles pour éviter les contrefaçons des produits du terroir sur les marchés internationaux." },
                    { t: "Création d'un orchestre philharmonique des jeunes d'Europe", d: "Cent musiciens talentueux issus de divers horizons vont participer à une grande tournée artistique continentale." },
                    { t: "Sommet de l'innovation numérique et des architectures cloud", d: "Les leaders de la tech se réunissent pour définir les standards de sécurité applicables aux données industrielles." }
                ],
                world: [
                    { t: "Transition globale: Hausse record des investissements solaires", d: "Les rapports internationaux indiquent un basculement historique vers les énergies renouvelables à l'échelle mondiale." },
                    { t: "Découverte archéologique majeure au cœur de la jungle d'Amérique centrale", d: "Des technologies laser révèlent les fondations oubliées d'une cité antique d'une ampleur insoupçonnée." },
                    { t: "Protocole international pour la sécurité des télécommunications", d: "Les nations s'accordent sur un traité cadre pour sécuriser les câbles sous-marins de transmission internet." },
                    { t: "Expédition scientifique réussie dans les fosses océaniques du Pacifique", d: "Des chercheurs observent des espèces vivantes uniques adaptées aux conditions de pression extrêmes." },
                    { t: "Conférence mondiale pour la gestion des réserves d'eau douce", d: "Les experts tirent la sonnette d'alarme et proposent des solutions de partage équitable des fleuves frontaliers." },
                    { t: "Succès d'une mission d'observation des astéroïdes géocroiseurs", d: "Un nouveau télescope spatial transmet des données cruciales pour cartographier les trajectoires des corps célestes." },
                    { t: "Plan mondial de lutte contre la pollution plastique des océans", d: "Une coalition industrielle s'engage à réduire la production de polymères non dégradables à usage unique." },
                    { t: "Sommet international pour le développement de la médecine préventive", d: "Les ministères partagent leurs stratégies pour anticiper les défis liés au vieillissement des populations." },
                    { t: "Déploiement de fermes agricoles connectées dans les zones arides", d: "Des systèmes d'irrigation gérés par capteurs permettent de faire pousser des cultures avec un minimum d'eau." },
                    { t: "Rapport annuel sur la stabilisation des écosystèmes forestiers tropicaux", d: "Les images satellites montrent un ralentissement encourageant de la déforestation dans les réserves majeures." }
                ]
            };

            let globalId = 0;

            const makeCards = (sectionArray, containerId) => {
                const targetBox = document.getElementById(containerId);
                sectionArray.forEach(item => {
                    const articleObj = { id: globalId, title: item.t, text: item.d, payload: null };
                    newsArticlesCache.push(articleObj);

                    const card = document.createElement('div');
                    card.className = 'content-card';
                    let bindId = globalId;
                    card.onclick = () => runAiPipeline(bindId);
                    card.innerHTML = `<h3>${item.t}</h3><p>${item.d}</p>`;
                    targetBox.appendChild(card);
                    globalId++;
                });
            };

            makeCards(database.paris, 'news-paris-container');
            makeCards(database.europe, 'news-europe-container');
            makeCards(database.world, 'news-world-container');
        }

        async function runAiPipeline(id) {
            const key = getApiKey();
            if (!key) return;

            const article = newsArticlesCache.find(a => a.id === id);
            selectedArticle = article;

            if (article.payload) { openReader(); return; }

            document.getElementById('news-feeds-canvas').style.display = 'none';
            document.getElementById('loading-spinner-block').style.display = 'block';

            const promptText = `
            Context: Title: ${article.title}. Text: ${article.text}
            Task: Re-author this context into exactly 3 full paragraphs for each of these 5 language tiers: A1, A2, B1, C1, Fluide. 
            In each French tier block, wrap exactly 3 important vocabulary words inside HTML bold tags like <b>mot</b>.
            Provide matching English translations for each tier.
            Return ONLY a raw JSON structure matching this blueprint:
            {
              "title": "${article.title}",
              "A1": "<p>...</p><p>...</p><p>...</p>",
              "A2": "<p>...</p><p>...</p><p>...</p>",
              "B1": "<p>...</p><p>...</p><p>...</p>",
              "C1": "<p>...</p><p>...</p><p>...</p>",
              "Fluide": "<p>...</p><p>...</p><p>...</p>",
              "Eng_A1": "English text...", "Eng_A2": "English text...", "Eng_B1": "English text...", "Eng_C1": "English text...", "Eng_Fluide": "English text..."
            }`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await res.json();
                article.payload = JSON.parse(data.candidates[0].content.parts[0].text);
                
                document.getElementById('news-feeds-canvas').style.display = 'block';
                document.getElementById('loading-spinner-block').style.display = 'none';
                openReader();
            } catch (e) {
                alert("Erreur de connexion avec l'IA. Vérifiez votre clé.");
                document.getElementById('news-feeds-canvas').style.display = 'block';
                document.getElementById('loading-spinner-block').style.display = 'none';
            }
        }

        function openReader() {
            document.getElementById('view-news').classList.remove('active');
            document.getElementById('view-reader').classList.add('active');
            renderContent();
        }

        function exitReaderView() {
            document.getElementById('view-reader').classList.remove('active');
            document.getElementById('view-news').classList.add('active');
        }

        function renderContent() {
            const data = selectedArticle.payload;
            const key = levels[selectedLevelIndex];
            document.getElementById('level-tag').innerText = key;
            document.getElementById('reader-title-display').innerText = data.title;

            let bodyHtml = data[key];
            let cleanBody = bodyHtml.replace(/<b>(.*?)<\/b>/g, function(m, word) {
                return `<span class="w" data-en="Terme d'étude">${word}</span>`;
            });
            document.getElementById('reader-body-display').innerHTML = cleanBody;

            // RENDER DYNAMIC VISUAL MARKING ADVERT
            const ad = adMatrix[selectedLevelIndex];
            let cleanAd = ad.header.replace(/<b>(.*?)<\/b>/g, function(m, word) {
                return `<span class="w" style="border-bottom-color:#e60000; color:#fff;" data-en="Ad Term">${word}</span>`;
            });
            document.getElementById('ad-header-display').innerHTML = cleanAd;
            document.getElementById('ad-badge-display').innerText = ad.badge;
            document.getElementById('ad-cta-display').innerText = ad.cta;

            document.getElementById('reader-translation-panel').innerText = `${data["Eng_" + key]}\n\n===========================\n📊 PUBLICITÉ METRICS:\n${ad.eng}`;
            
            document.querySelectorAll('span.w').forEach(el => {
                el.onclick = function(e) {
                    e.stopPropagation();
                    const wordText = this.innerText;
                    showToast(`💡 ${wordText} ajouté aux Flashcards !`);
                    if(!vocabularyList.find(v => v.fr === wordText)) {
                        vocabularyList.push({ fr: wordText, en: "Vocabulaire" });
                        document.getElementById('global-card-count').innerText = vocabularyList.length;
                    }
                };
            });
        }

        function toggleTranslationBox() {
            const p = document.getElementById('reader-translation-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function renderFlashcards() {
            const w = document.getElementById('deck-wrapper');
            if (vocabularyList.length === 0) {
                w.innerHTML = `<div class="empty-deck"><p>Votre carnet est vide. Touchez les mots soulignés pour commencer.</p></div>`;
                return;
            }
            if (activeCardIndex >= vocabularyList.length) activeCardIndex = 0;
            const card = vocabularyList[activeCardIndex];
            w.innerHTML = `
                <div class="flashcard-container">
                    <div class="card-counter">Mot ${activeCardIndex + 1} / ${vocabularyList.length}</div>
                    <div class="flashcard" onclick="document.getElementById('fc-back').style.display = (document.getElementById('fc-back').style.display === 'block') ? 'none' : 'block'">
                        <div class="word-surface">${card.fr}</div>
                        <div class="word-translation" id="fc-back">Traduction / Définition</div>
                        <div class="card-hint">Tapez pour retourner</div>
                    </div>
                    <div class="card-controls">
                        <button class="card-btn btn-unknown" onclick="activeCardIndex++; renderFlashcards();">Je ne sais pas</button>
                        <button class="card-btn btn-know" onclick="vocabularyList.splice(activeCardIndex, 1); document.getElementById('global-card-count').innerText = vocabularyList.length; renderFlashcards();">Je sais ✅</button>
                    </div>
                </div>`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerHTML = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        document.getElementById('level-slider').addEventListener('input', function() {
            selectedLevelIndex = parseInt(this.value);
            renderContent();
        });

        window.onload = function() { generateMultiFeedMatrix(); };
    </script>
</body>
</html>
