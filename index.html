<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LangSift Direct v5.3</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --card-bg: #ffffff;
            --text-color: #2c2520;
            --text-muted: #6e655f;
            --accent-color: #8c7853;
            --accent-light: #eaddca;
            --success-color: #2e7d32;
            --nav-bg: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 500px; width: 100%; min-height: 100vh; box-sizing: border-box; padding: 20px 20px 110px 20px; }
        .menu-view { display: none; }
        .menu-view.active { display: block; }
        .app-header { margin-top: 10px; margin-bottom: 15px; text-align: center; }
        .app-header h1 { font-size: 26px; margin: 0; font-family: Georgia, serif; }
        .app-header p { color: var(--text-muted); margin: 4px 0 0 0; font-size: 13px; }
        
        .settings-panel { background-color: #f5f1e9; border-radius: 14px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--accent-light); display: none; }
        .settings-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .settings-select { padding: 10px; border-radius: 8px; border: 1px solid var(--accent-light); background: white; font-size: 13px; font-weight: bold; width: 100%; box-sizing: border-box; outline: none; }

        .feed-tabs-container { display: flex; background: rgba(140, 120, 83, 0.08); padding: 4px; border-radius: 25px; margin: 20px 0; gap: 4px; }
        .feed-tab-btn { flex: 1; background: none; border: none; padding: 10px 2px; border-radius: 20px; font-size: 12px; font-weight: bold; color: var(--text-muted); cursor: pointer; text-align: center; }
        .feed-tab-btn.active { background: var(--card-bg); color: var(--text-color); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .feed-panel { display: none; }
        .feed-panel.active { display: flex; flex-direction: column; gap: 12px; }

        .action-bar { display: flex; justify-content: center; margin-bottom: 15px; gap: 10px; }
        .refresh-btn { background-color: var(--card-bg); border: 1px solid var(--accent-light); color: var(--accent-color); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .content-card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); cursor: pointer; }
        .content-card h3 { margin: 0 0 6px 0; font-size: 15px; line-height: 1.35; }
        .content-card p { margin: 0; font-size: 12px; color: var(--text-muted); line-height: 1.4; }
        
        .reader-header { position: fixed; top: 0; left: 0; right: 0; background-color: var(--bg-color); padding: 14px 20px; box-shadow: 0 3px 15px rgba(0,0,0,0.07); display: flex; flex-direction: column; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-row { display: flex; width: 100%; max-width: 500px; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .back-btn { background: none; border: none; font-size: 15px; color: var(--accent-color); font-weight: bold; cursor: pointer; }
        .slider-container { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; }
        input[type="range"] { width: 100%; accent-color: var(--accent-color); margin: 4px 0; }
        
        .reader-content { margin-top: 145px; width: 100%; }
        .story-title { font-family: Georgia, serif; font-size: 24px; margin-bottom: 18px; font-weight: bold; }
        .text-block p { font-size: 17px; line-height: 1.9; margin-bottom: 22px; text-align: justify; }
        .reader-content span.w { cursor: pointer; border-bottom: 1px dotted var(--accent-color); padding: 0 2px; }
        
        .eng-toggle-btn { display: block; margin: 25px auto; background: none; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .english-translation-panel { background-color: #f3f0ea; padding: 16px; font-size: 14.5px; display: none; margin-bottom: 35px; }
        
        .loading-screen { display: none; text-align: center; padding: 50px 20px; font-style: italic; color: var(--text-muted); }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--accent-color); animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background-color: var(--nav-bg); border-top: 1px solid rgba(0,0,0,0.06); display: flex; justify-content: space-around; align-items: center; z-index: 900; }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #aaa; font-size: 11px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); }
        .toast { position: fixed; bottom: 80px; background: #2c2520; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; display: none; z-index: 2000; text-align: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="view-news" class="menu-view active">
            <div class="app-header"><h1>LangSift Direct</h1></div>
            <div class="action-bar">
                <button class="refresh-btn" onclick="toggleSettingsDrawer()">⚙️ Réglages</button>
            </div>
            <div id="settings-drawer" class="settings-panel">
                <div class="settings-row">
                    <label>Profil de langue :</label>
                    <select id="setting-language-hub" class="settings-select" onchange="handleLanguageHubChange()">
                        <option value="fr">🇫🇷 Paris (Français)</option>
                        <option value="de">🇩🇪 Berlin (Deutsch)</option>
                        <option value="fi">🇫🇮 Helsinki (Suomi)</option>
                    </select>
                </div>
            </div>
            <div id="loading-spinner-block" class="loading-screen"><div class="spinner"></div><div>Analyse IA...</div></div>
            <div id="news-feeds-canvas">
                <div class="feed-tabs-container">
                    <button id="tab-local" class="feed-tab-btn active" onclick="switchFeedPanel('local')">📍 Locale</button>
                    <button id="tab-europe" class="feed-tab-btn" onclick="switchFeedPanel('europe')">🇪🇺 Europe</button>
                    <button id="tab-world" class="feed-tab-btn" onclick="switchFeedPanel('world')">🌍 Monde</button>
                </div>
                <div id="panel-local" class="feed-panel active"></div>
                <div id="panel-europe" class="feed-panel"></div>
                <div id="panel-world" class="feed-panel"></div>
            </div>
        </div>

        <div id="view-reader" class="menu-view">
            <div class="reader-header">
                <button class="back-btn" onclick="exitReaderView()">✕ Fermer</button>
                <div class="slider-container">
                    <input type="range" id="level-slider" min="1" max="5" value="1" step="1">
                </div>
            </div>
            <div class="reader-content">
                <div id="reader-title-display" class="story-title"></div>
                <div id="reader-body-display" class="text-block"></div>
                <button class="eng-toggle-btn" onclick="toggleTranslationBox()">Afficher la traduction</button>
                <div id="reader-translation-panel" class="english-translation-panel"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchActiveTab('view-news', this)">📰 Actu</button>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        let newsArticlesCache = [];
        let selectedLevelIndex = 1;
        let selectedArticle = null;
        let activeLanguageHub = "fr";
        const levels = { 1: "A1", 2: "A2", 3: "B1", 4: "C1", 5: "Fluide" };

        const nativeDatabase = {
            fr: [{ t: "Paris 2026", d: "La Mairie de Paris modernise ses grands boulevards avec plus d'espaces verts." }],
            de: [{ t: "Berlin 2026", d: "Das Berliner Rathaus startet einen massiven Begrünungsplan." }],
            fi: [{ t: "Helsinki 2026", d: "Helsingin kaupunki aloittaa uuden viherryttämisohjelman." }],
            europe: [{ t: "UE Énergie", d: "L'Union Européenne adopte des normes pour l'isolation thermique." }],
            world: [{ t: "Climat Global", d: "Les investissements solaires augmentent à travers le monde." }]
        };

        function getApiKey() {
            let key = localStorage.getItem('GEMINI_KEY');
            if (!key) { key = prompt("Clé API Google AI Studio :"); if(key) localStorage.setItem('GEMINI_KEY', key); }
            return key;
        }

        async function runAiPipeline(id) {
            const key = getApiKey();
            if (!key) return;
            const article = newsArticlesCache.find(a => a.id === id);
            selectedArticle = article;
            if (article.payload) { openReader(); return; }

            document.getElementById('news-feeds-canvas').style.display = 'none';
            document.getElementById('loading-spinner-block').style.display = 'block';

            const promptText = `Rewrite this: Title: ${article.title}, Text: ${article.text}. Write 3 long paragraphs for A1, A2, B1, C1, Fluide tiers. Return ONLY JSON: {"title":"...","A1":"<p>...</p>","A2":"<p>...</p>","B1":"<p>...</p>","C1":"<p>...</p>","Fluide":"<p>...</p>","Eng_A1":"...","Eng_A2":"...","Eng_B1":"...","Eng_C1":"...","Eng_Fluide":"..."}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await res.json();
                let cleanJson = data.candidates[0].content.parts[0].text.replace(/^```json/, "").replace(/```$/, "");
                article.payload = JSON.parse(cleanJson);
                document.getElementById('loading-spinner-block').style.display = 'none';
                document.getElementById('news-feeds-canvas').style.display = 'block';
                openReader();
            } catch (e) {
                console.error(e);
                alert("Erreur IA - Vérifiez la clé API ou le format.");
                document.getElementById('news-feeds-canvas').style.display = 'block';
                document.getElementById('loading-spinner-block').style.display = 'none';
            }
        }

        function generateMultiFeedMatrix() {
            newsArticlesCache = []; let id = 0;
            ['local', 'europe', 'world'].forEach(s => {
                const source = (s === 'local') ? nativeDatabase[activeLanguageHub] : nativeDatabase[s];
                source.forEach(item => { newsArticlesCache.push({ id: id++, section: s, title: item.t, text: item.d, payload: null }); });
            });
            renderFeedModules();
        }

        function renderFeedModules() {
            ['local', 'europe', 'world'].forEach(s => {
                const box = document.getElementById(`panel-${s}`); box.innerHTML = '';
                newsArticlesCache.filter(a => a.section === s).forEach(art => {
                    const card = document.createElement('div');
                    card.className = 'content-card';
                    card.onclick = () => runAiPipeline(art.id);
                    card.innerHTML = `<h3>${art.title}</h3><p>${art.text}</p>`;
                    box.appendChild(card);
                });
            });
        }

        function openReader() {
            document.getElementById('view-news').classList.remove('active');
            document.getElementById('view-reader').classList.add('active');
            renderContent();
        }

        function exitReaderView() {
            document.getElementById('view-reader').classList.remove('active');
            document.getElementById('view-news').classList.add('active');
        }

        function renderContent() {
            const data = selectedArticle.payload;
            const key = levels[selectedLevelIndex];
            document.getElementById('reader-title-display').innerText = data.title;
            document.getElementById('reader-body-display').innerHTML = data[key];
            document.getElementById('reader-translation-panel').innerText = data["Eng_" + key];
        }

        function toggleTranslationBox() {
            const p = document.getElementById('reader-translation-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function toggleSettingsDrawer() { document.getElementById('settings-drawer').style.display = (document.getElementById('settings-drawer').style.display === 'block') ? 'none' : 'block'; }
        function handleLanguageHubChange() { activeLanguageHub = document.getElementById('setting-language-hub').value; generateMultiFeedMatrix(); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        document.getElementById('level-slider').addEventListener('input', function() { selectedLevelIndex = parseInt(this.value); renderContent(); });
        window.onload = generateMultiFeedMatrix;
    </script>
</body>
</html>
