<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LangSift Direct - Final Recovery</title>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --text-color: #2c2520; --text-muted: #6e655f; --accent-color: #8c7853; --accent-light: #eaddca; --nav-bg: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px 20px 80px 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 500px; width: 100%; }
        .menu-view { display: none; } .menu-view.active { display: block; }
        .content-card { background: var(--card-bg); padding: 16px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .refresh-btn { background: white; border: 1px solid var(--accent-light); padding: 10px; width: 100%; border-radius: 20px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        
        /* Nav Bar Styles */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: var(--nav-bg); border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 12px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="view-news" class="menu-view active">
            <h1>LangSift Direct</h1>
            <button class="refresh-btn" onclick="document.getElementById('settings').style.display=(document.getElementById('settings').style.display==='block'?'none':'block')">⚙️ Réglages</button>
            <div id="settings" style="display:none; margin-bottom: 20px;">
                <button id="dev-mode-btn" class="refresh-btn" onclick="toggleDevMode()" style="color: #c62828;"></button>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="view-reader" class="menu-view">
            <button onclick="exitReaderView()">✕ Retour</button>
            <h2 id="reader-title"></h2>
            <div id="reader-body"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('view-news', this)">📰 News</button>
        <button class="nav-item" onclick="switchTab('view-games', this)">🎮 Games</button>
    </div>

    <script>
        const nativeDatabase = [
            { id: 1, t: "Paris 2026", d: "La ville de Paris lance un plan vert." },
            { id: 2, t: "Pistes cyclables", d: "De nouvelles pistes protégées." }
        ];

        let isDevMode = localStorage.getItem('DEV_MODE') === 'true';

        function initApp() {
            document.getElementById('dev-mode-btn').innerText = `Mode Développeur: ${isDevMode ? 'ON' : 'OFF'}`;
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            nativeDatabase.forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.innerHTML = `<h3>${item.t}</h3><p>${item.d}</p>`;
                card.onclick = () => runAiPipeline(item);
                container.appendChild(card);
            });
        }

        function switchTab(viewId, btn) {
            document.querySelectorAll('.menu-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            btn.classList.add('active');
        }

        async function runAiPipeline(articleData) {
            if (isDevMode) {
                articleData.payload = { title: articleData.t, A1: `<p>Contenu simulé pour: <b>${articleData.t}</b>.</p>` };
                openReader(articleData);
                return;
            }
            alert("Live Mode: API not configured.");
        }

        function openReader(art) {
            document.getElementById('view-news').classList.remove('active');
            document.getElementById('view-reader').classList.add('active');
            document.getElementById('reader-title').innerText = art.payload.title;
            document.getElementById('reader-body').innerHTML = art.payload.A1;
        }

        function exitReaderView() {
            document.getElementById('view-reader').classList.remove('active');
            document.getElementById('view-news').classList.add('active');
        }

        function toggleDevMode() {
            localStorage.setItem('DEV_MODE', !isDevMode);
            location.reload();
        }

        window.onload = initApp;
    </script>
</body>
</html>
