<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LangSift Direct v5.3 (Mock Ready)</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --card-bg: #ffffff;
            --text-color: #2c2520;
            --text-muted: #6e655f;
            --accent-color: #8c7853;
            --accent-light: #eaddca;
            --success-color: #2e7d32;
            --nav-bg: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 500px; width: 100%; min-height: 100vh; box-sizing: border-box; padding: 20px 20px 110px 20px; }
        .menu-view { display: none; }
        .menu-view.active { display: block; }
        .app-header { margin-top: 10px; margin-bottom: 15px; text-align: center; }
        .app-header h1 { font-size: 26px; margin: 0; font-family: Georgia, serif; }
        .app-header p { color: var(--text-muted); margin: 4px 0 0 0; font-size: 13px; }
        
        /* PREMIUM SLIDING SETTINGS DRAWER PANEL */
        .settings-panel {
            background-color: #f5f1e9;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--accent-light);
            display: none;
        }
        .settings-panel h3 { margin: 0 0 12px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-color); }
        .settings-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .settings-row label { font-size: 12px; font-weight: bold; color: var(--text-muted); }
        .settings-select { padding: 10px; border-radius: 8px; border: 1px solid var(--accent-light); background: white; font-size: 13px; font-weight: bold; color: var(--text-color); width: 100%; box-sizing: border-box; outline: none; }

        .feed-tabs-container {
            display: flex;
            background: rgba(140, 120, 83, 0.08);
            padding: 4px;
            border-radius: 25px;
            margin: 20px 0;
            gap: 4px;
        }
        .feed-tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 2px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .feed-tab-btn.active {
            background: var(--card-bg);
            color: var(--text-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .feed-panel { display: none; }
        .feed-panel.active { display: flex; flex-direction: column; gap: 12px; }

        .action-bar { display: flex; justify-content: center; margin-bottom: 15px; gap: 10px; }
        .refresh-btn { background-color: var(--card-bg); border: 1px solid var(--accent-light); color: var(--accent-color); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .content-card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); cursor: pointer; }
        .content-card h3 { margin: 0 0 6px 0; font-size: 15px; line-height: 1.35; }
        .content-card p { margin: 0; font-size: 12px; color: var(--text-muted); line-height: 1.4; }
        
        .reader-header { position: fixed; top: 0; left: 0; right: 0; background-color: var(--bg-color); padding: 14px 20px; box-shadow: 0 3px 15px rgba(0,0,0,0.07); display: flex; flex-direction: column; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-row { display: flex; width: 100%; max-width: 500px; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .back-btn { background: none; border: none; font-size: 15px; color: var(--accent-color); font-weight: bold; cursor: pointer; }
        .slider-label { font-size: 12px; font-weight: bold; }
        .slider-container { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; }
        input[type="range"] { width: 100%; accent-color: var(--accent-color); margin: 4px 0; }
        .ticks { display: flex; justify-content: space-between; width: 100%; font-size: 10px; font-weight: bold; color: #888; }
        
        .reader-content { margin-top: 145px; width: 100%; }
        .story-title { font-family: Georgia, serif; font-size: 24px; margin-bottom: 18px; line-height: 1.3; font-weight: bold; }
        
        .text-block p { font-size: 17px; line-height: 1.9; margin-bottom: 22px; text-align: justify; }
        .reader-content span.w { cursor: pointer; padding: 0 2px; border-radius: 3px; transition: background 0.15s ease; }
        .reader-content span.w:hover { background-color: var(--accent-light); }
        .reader-content span.w:active { background-color: #d8c4a0; }

        .eng-toggle-btn { display: block; margin: 25px auto; background: none; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .english-translation-panel { background-color: #f3f0ea; border-left: 4px solid var(--accent-color); padding: 16px; font-size: 14.5px; color: #444; line-height: 1.6; white-space: pre-line; display: none; margin-bottom: 35px; border-radius: 0 8px 8px 0; }
        
        .brand-ad-card { 
            position: relative; 
            min-height: 200px; 
            border-radius: 16px; 
            overflow: hidden; 
            margin: 35px 0; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            background-color: #000;
        }
        .brand-ad-bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&q=80&w=600');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .brand-ad-gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
        }
        .brand-ad-content {
            position: relative;
            z-index: 3;
            padding: 24px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
            box-sizing: border-box;
        }
        .brand-ad-label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; text-align: center; }
        .ad-badge { align-self: flex-start; background: #e60000; color: white; font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 20px; transform: rotate(-2deg); text-transform: uppercase; letter-spacing: 0.5px; }
        .ad-header { font-family: Georgia, serif; font-size: 19px; line-height: 1.4; margin: 20px 0 15px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.6); font-weight: bold; }
        .ad-footer-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; }
        .ad-cta { font-size: 13px; font-style: italic; color: #ddd; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .ad-tag-btn { background: #e60000; color: white; padding: 6px 14px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 2px 6px rgba(230,0,0,0.4); }
        
        .loading-screen { display: none; text-align: center; padding: 50px 20px; font-style: italic; color: var(--text-muted); }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--accent-color); animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .flashcard-container { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
        .card-counter { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
        .flashcard { width: 100%; max-width: 340px; height: 180px; background-color: var(--card-bg); border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; position: relative; cursor: pointer; }
        .flashcard .word-surface { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .flashcard .word-translation { font-size: 17px; color: var(--accent-color); font-style: italic; display: none; }
        .card-hint { position: absolute; bottom: 12px; font-size: 10px; color: #aaa; text-transform: uppercase; }
        .card-controls { display: flex; gap: 15px; margin-top: 20px; width: 100%; max-width: 340px; }
        .card-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .btn-know { background-color: var(--success-color); }
        .btn-unknown { background-color: var(--accent-color); }
        .empty-deck { text-align: center; color: var(--text-muted); padding: 40px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background-color: var(--nav-bg); border-top: 1px solid rgba(0,0,0,0.06); display: flex; justify-content: space-around; align-items: center; z-index: 900; }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #aaa; font-size: 11px; font-weight: bold; width: 33.3%; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item-icon { font-size: 18px; margin-bottom: 2px; }
        .toast { position: fixed; bottom: 80px; background: #2c2520; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; display: none; z-index: 2000; text-align: center; max-width: 80%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="view-news" class="menu-view active">
            <div class="app-header">
                <h1>LangSift Direct</h1>
                <p id="app-subtitle-label">Analyse multilingue et flux publicitaires CEFR</p>
            </div>
            
            <div class="action-bar">
                <button class="refresh-btn" onclick="toggleSettingsDrawer()">⚙️ Réglages</button>
                <button class="refresh-btn" onclick="rotateNewsCarousel()">🔄 Permuter</button>
            </div>

            <div id="settings-drawer" class="settings-panel">
                <h3>Configuration</h3>
                <div class="settings-row">
                    <label>Profil de langue cible :</label>
                    <select id="setting-language-hub" class="settings-select" onchange="handleLanguageHubChange()">
                        <option value="fr">🇫🇷 Paris (Français)</option>
                        <option value="de">🇩🇪 Berlin (Deutsch)</option>
                        <option value="fi">🇫🇮 Helsinki (Suomi)</option>
                    </select>
                </div>
                <button class="refresh-btn" style="width:100%; color:#c62828;" onclick="clearApiKey()">🔑 Reset API Key</button>
            </div>
            
            <div id="loading-spinner-block" class="loading-screen">
                <div class="spinner"></div>
                <div id="spinner-text-msg">Analyse linguistique...</div>
            </div>

            <div id="news-feeds-canvas">
                <div class="feed-tabs-container">
                    <button id="tab-local" class="feed-tab-btn active" onclick="switchFeedPanel('local')">📍 Locale</button>
                    <button id="tab-europe" class="feed-tab-btn" onclick="switchFeedPanel('europe')">🇪🇺 Europe</button>
                    <button id="tab-world" class="feed-tab-btn" onclick="switchFeedPanel('world')">🌍 Monde</button>
                </div>

                <div id="panel-local" class="feed-panel active"></div>
                <div id="panel-europe" class="feed-panel"></div>
                <div id="panel-world" class="feed-panel"></div>
            </div>
        </div>

        <div id="view-flashcards" class="menu-view">
            <div class="app-header">
                <h1>Mon Vocabulaire</h1>
            </div>
            <div id="deck-wrapper"></div>
        </div>

        <div id="view-reader" class="menu-view">
            <div class="reader-header">
                <div class="nav-row">
                    <button class="back-btn" onclick="exitReaderView()">✕ Retour</button>
                    <div class="slider-label">NIVEAU: <span id="level-tag">A1</span></div>
                </div>
                <div class="slider-container">
                    <input type="range" id="level-slider" min="1" max="5" value="1" step="1">
                    <div class="ticks">
                        <span>A1</span><span>A2</span><span>B1</span><span>C1</span><span>Fluide</span>
                    </div>
                </div>
            </div>

            <div class="reader-content">
                <div id="reader-title-display" class="story-title"></div>
                <div id="reader-body-display" class="text-block"></div>
                
                <div id="brand-ad-placement" class="brand-ad-card">
                    <div class="brand-ad-bg-image"></div>
                    <div class="brand-ad-gradient-overlay"></div>
                    <div class="brand-ad-content">
                        <div id="ad-badge-display" class="ad-badge"></div>
                        <div id="ad-header-display" class="ad-header"></div>
                        <div class="ad-footer-row">
                            <div id="ad-cta-display" class="ad-cta"></div>
                            <div class="ad-tag-btn">Coca-Cola Zéro</div>
                        </div>
                    </div>
                </div>

                <button class="eng-toggle-btn" onclick="toggleTranslationBox()">Afficher la traduction</button>
                <div id="reader-translation-panel" class="english-translation-panel"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchActiveTab('view-news', this)">
            <div class="nav-item-icon">📰</div><div>Actu</div>
        </button>
        <button class="nav-item" onclick="switchActiveTab('view-flashcards', this)">
            <div class="nav-item-icon">🎴</div><div>Vocab (<span id="global-card-count">0</span>)</div>
        </button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let vocabularyList = [];
        let newsArticlesCache = [];
        let selectedLevelIndex = 1;
        let selectedArticle = null;
        let activeCardIndex = 0;
        let currentCarouselBatchIndex = 0; 
        let activeLanguageHub = "fr";
        const levels = { 1: "A1", 2: "A2", 3: "B1", 4: "C1", 5: "Fluide" };

        const nativeDatabase = {
            fr: [{ t: "Paris 2026", d: "La ville de Paris lance un plan vert majeur pour transformer les rues." }, { t: "Pistes cyclables", d: "De nouvelles pistes protégées arrivent en ville." }],
            de: [{ t: "Berlin 2026", d: "Berlin startet einen massiven Begrünungsplan." }, { t: "Radwege", d: "Neue Radwege verbessern die Mobilität." }],
            fi: [{ t: "Helsinki 2026", d: "Helsinki aloittaa vihreän uudistuksen." }, { t: "Pyörätiet", d: "Uudet pyörätiet parantavat liikennettä." }],
            europe: [{ t: "EU Énergie", d: "L'UE adopte des normes énergétiques." }],
            world: [{ t: "Climat", d: "Hausse record des investissements solaires." }]
        };

        const localMultiLanguageDict = {
            fr: { "ville": "city", "plan": "plan", "rues": "streets", "pistes": "paths" },
            de: { "stadt": "city", "plan": "plan", "radwege": "bike paths" },
            fi: { "kaupunki": "city", "pyörätiet": "cycle paths" }
        };

        function getApiKey() { return localStorage.getItem('GEMINI_KEY'); }

        function clearApiKey() { localStorage.removeItem('GEMINI_KEY'); alert("Clé supprimée."); location.reload(); }
        
        function toggleSettingsDrawer() { document.getElementById('settings-drawer').style.display = (document.getElementById('settings-drawer').style.display === 'block') ? 'none' : 'block'; }

        function handleLanguageHubChange() { activeLanguageHub = document.getElementById('setting-language-hub').value; generateMultiFeedMatrix(); }

        function switchActiveTab(tabId, element) {
            document.querySelectorAll('.menu-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            if (tabId === 'view-flashcards') renderFlashcards();
        }

        function switchFeedPanel(panelKey) {
            document.querySelectorAll('.feed-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.feed-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${panelKey}`).classList.add('active');
            document.getElementById(`panel-${panelKey}`).classList.add('active');
        }

        function rotateNewsCarousel() { currentCarouselBatchIndex = (currentCarouselBatchIndex === 0) ? 1 : 0; renderFeedModules(); }

        function generateMultiFeedMatrix() {
            newsArticlesCache = []; let globalId = 0;
            ['local', 'europe', 'world'].forEach(sk => {
                const arr = (sk === 'local') ? nativeDatabase[activeLanguageHub] : nativeDatabase[sk];
                arr.forEach(i => { newsArticlesCache.push({ id: globalId++, section: sk, title: i.t, text: i.d, payload: null }); });
            });
            renderFeedModules();
        }

        function renderFeedModules() {
            ['local', 'europe', 'world'].forEach(sk => {
                const box = document.getElementById(`panel-${sk}`); box.innerHTML = '';
                newsArticlesCache.filter(a => a.section === sk).forEach(obj => {
                    const card = document.createElement('div'); card.className = 'content-card';
                    card.onclick = () => runAiPipeline(obj.id);
                    card.innerHTML = `<h3>${obj.title}</h3><p>${obj.text}</p>`;
                    box.appendChild(card);
                });
            });
        }

        async function runAiPipeline(id) {
            const article = newsArticlesCache.find(a => a.id === id);
            selectedArticle = article;
            
            // Mock Mode: If no key, auto-generate content
            if (!getApiKey()) {
                article.payload = {
                    title: article.title,
                    A1: "<p>Ceci est une histoire simple sur la ville.</p><p>Le plan est très vert et beau.</p>",
                    Eng_A1: "This is a simple story about the city. The plan is very green and beautiful.",
                    A2: "<p>Le nouveau projet urbain change la ville.</p><p>Les habitants sont très contents de ce changement.</p>",
                    Eng_A2: "The new urban project is changing the city. The inhabitants are very happy about this change.",
                    B1: "<p>La modernisation de la ville est essentielle pour l'avenir.</p><p>Les autorités travaillent sur un nouveau système durable.</p>",
                    Eng_B1: "The modernization of the city is essential for the future. The authorities are working on a new sustainable system.",
                    C1: "<p>Cette initiative audacieuse redéfinit l'urbanisme contemporain.</p><p>L'intégration de technologies vertes offre des opportunités uniques.</p>",
                    Eng_C1: "This bold initiative redefines contemporary urban planning. Integrating green technologies offers unique opportunities.",
                    Fluide: "<p>Un bouleversement structurel s'opère au cœur de notre capitale.</p><p>L'innovation architecturale rencontre les impératifs écologiques du siècle.</p>",
                    Eng_Fluide: "A structural upheaval is taking place at the heart of our capital. Architectural innovation meets the ecological imperatives of the century."
                };
                openReader();
                return;
            }
            // ... (Existing API Logic)
        }

        function openReader() { document.getElementById('view-news').classList.remove('active'); document.getElementById('view-reader').classList.add('active'); renderContent(); }
        function exitReaderView() { document.getElementById('view-reader').classList.remove('active'); document.getElementById('view-news').classList.add('active'); }

        function renderContent() {
            const data = selectedArticle.payload;
            const key = levels[selectedLevelIndex];
            document.getElementById('level-tag').innerText = key;
            document.getElementById('reader-title-display').innerText = data.title;
            document.getElementById('reader-body-display').innerHTML = data[key];
            document.getElementById('reader-translation-panel').innerText = data["Eng_" + key];
        }

        function toggleTranslationBox() { const p = document.getElementById('reader-translation-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; }
        
        function renderFlashcards() {
            const w = document.getElementById('deck-wrapper');
            if (vocabularyList.length === 0) { w.innerHTML = `<div class="empty-deck"><p>Aucun mot pour le moment.</p></div>`; return; }
            const card = vocabularyList[activeCardIndex];
            w.innerHTML = `<div class="flashcard-container"><div class="flashcard" onclick="document.getElementById('fc-back').style.display='block'"><div class="word-surface">${card.fr}</div><div class="word-translation" id="fc-back">${card.en}</div></div></div>`;
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.innerHTML = msg; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 2200); }

        document.getElementById('level-slider').addEventListener('input', function() { selectedLevelIndex = parseInt(this.value); renderContent(); });

        window.onload = () => { generateMultiFeedMatrix(); };
    </script>
</body>
</html>
