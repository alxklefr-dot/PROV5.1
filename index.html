<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangSift Direct - Cache-First</title>
    <style>
        :root { --accent-color: #8c7853; }
        body { font-family: sans-serif; background: #fdfbf7; margin: 0; padding: 20px; }
        .app-container { max-width: 500px; margin: auto; }
        .menu-view { display: none; } .menu-view.active { display: block; }
        .content-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid #eee; }
        .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 10px; background: #e0e0e0; }
        .nav-btn { background: none; border: none; cursor: pointer; color: var(--accent-color); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="settings" style="display:none; padding:15px; background:#f0f0f0; border-radius:10px; margin-bottom:20px;">
            <button id="dev-mode-btn" onclick="toggleDevMode()"></button>
            <div id="api-monitor" style="margin-top:10px;">
                <span class="status-badge">API Status: <span id="api-status">IDLE</span></span>
            </div>
        </div>

        <div id="view-news" class="menu-view active">
            <h1>LangSift Direct</h1>
            <button onclick="document.getElementById('settings').style.display=(document.getElementById('settings').style.display==='block'?'none':'block')">⚙️ Réglages</button>
            <div id="feed-container"></div>
        </div>
    </div>

    <script>
        const db = [
            { id: 1, section: 'france', t: "Paris 2026", d: "Projets verts." },
            { id: 2, section: 'europe', t: "UE Énergie", d: "Nouvelles normes." },
            { id: 3, section: 'global', t: "Climat", d: "Investissements solaires." }
        ];

        let isDevMode = localStorage.getItem('DEV_MODE') === 'true';

        function initApp() {
            document.getElementById('dev-mode-btn').innerText = `Dev Mode: ${isDevMode ? 'ON' : 'OFF'}`;
            const feed = document.getElementById('feed-container');
            db.forEach(item => {
                const div = document.createElement('div');
                div.className = 'content-card';
                div.innerHTML = `<h3>[${item.section.toUpperCase()}] ${item.t}</h3><p>${item.d}</p>`;
                div.onclick = () => runAiPipeline(item);
                feed.appendChild(div);
            });
        }

        async function runAiPipeline(art) {
            const status = document.getElementById('api-status');
            
            // 1. CACHE CHECK
            const cached = localStorage.getItem(`art_${art.id}`);
            if (cached) {
                status.innerText = "CACHED";
                console.log("Loading from storage...");
                return;
            }

            // 2. DEV MODE
            if (isDevMode) {
                status.innerText = "MOCKING";
                art.payload = { title: art.t, A1: "Contenu simulé." };
                localStorage.setItem(`art_${art.id}`, JSON.stringify(art.payload));
                return;
            }

            // 3. LIVE FETCH
            status.innerText = "FETCHING...";
            try {
                // YOUR API CALL GOES HERE
                // await fetch(...).then(...)
                status.innerText = "LIVE DATA";
            } catch (e) {
                status.innerText = "ERROR";
            }
        }

        function toggleDevMode() {
            localStorage.setItem('DEV_MODE', !isDevMode);
            location.reload();
        }

        window.onload = initApp;
    </script>
</body>
</html>
